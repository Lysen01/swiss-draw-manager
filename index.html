<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swiss Draw Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__inner">
        <h1>Swiss Draw Manager</h1>
        <p>Швейцарська система жеребкування для дитячих та аматорських турнірів</p>
      </div>
    </header>

    <nav class="tabs" id="tabsNav">
      <button class="tab-btn active" data-tab="tournament" type="button">Турнір</button>
      <button class="tab-btn" data-tab="players" type="button">База гравців</button>
      <button class="tab-btn" data-tab="archive" type="button">Архів турнірів</button>
    </nav>

    <main>
      <section id="tab-tournament" class="layout tab-panel active">
        <section class="card full">
          <div id="tournamentSubtabs" class="subtabs">
            <button class="subtab-btn active" type="button" data-tournament-view="setup">Налаштування турніру</button>
            <button class="subtab-btn" type="button" data-tournament-view="play">Проведення турніру</button>
          </div>
        </section>

        <section class="card" data-tour-view="setup">
          <h2>Налаштування турніру</h2>
          <form id="settingsForm" class="grid-form">
            <label>
              Назва турніру
              <input id="tournamentName" type="text" required />
            </label>
            <label>
              Кількість турів
              <input id="roundsCount" type="number" min="1" max="15" required />
            </label>
            <label>
              Формат турніру
              <select id="tournamentFormat">
                <option value="swiss">Швейцарська система</option>
                <option value="round_robin">Кругова система</option>
              </select>
            </label>
            <label>
              Дата проведення
              <input id="tournamentDate" type="date" />
            </label>
            <label>
              Контроль часу
              <input id="tournamentTimeControl" type="text" placeholder="Наприклад: 10+5" />
            </label>
            <label>
              Фото турніру
              <input id="tournamentPhoto" type="file" accept="image/*" />
            </label>
            <label class="check-inline check-inline--row">
              <input id="tournamentRemovePhoto" type="checkbox" />
              Видалити фото турніру
            </label>
            <button type="submit">Застосувати</button>
          </form>
          <div id="tournamentSettingsPreview" class="tournament-settings-preview" hidden>
            <img id="tournamentSettingsPhoto" alt="Фото турніру" hidden />
            <div class="tournament-settings-preview__meta">
              <div id="tournamentSettingsDate" class="meta"></div>
              <div id="tournamentSettingsControl" class="meta"></div>
            </div>
          </div>
        </section>

        <section class="card" data-tour-view="setup">
          <h2>Учасники</h2>
          <p class="meta">Учасників можна додати тільки з бази гравців.</p>

          <div class="inline-form" style="margin-top: 8px">
            <select id="dbPlayerSelect"></select>
            <button id="addFromBaseBtn" type="button">Додати з бази</button>
          </div>

          <div class="toolbar">
            <button id="seedDemoBtn" type="button">Демо-учасники</button>
            <button id="resetBtn" type="button" class="danger">Новий турнір</button>
          </div>
          <div id="playersList" class="scroll"></div>
        </section>

        <section class="card" data-tour-view="play">
          <h2>Раунди</h2>
          <div class="toolbar">
            <button id="generateRoundBtn" type="button">Згенерувати наступний тур</button>
            <button id="finishTournamentBtn" type="button">Завершити турнір</button>
          </div>
          <div id="roundMeta" class="meta"></div>
          <div id="pairings" class="scroll"></div>
        </section>

        <section class="card" data-tour-view="play">
          <h2>Таблиця</h2>
          <div id="standings" class="scroll"></div>
        </section>
      </section>

      <section id="tab-players" class="layout tab-panel">
        <section class="card full">
          <h2>База гравців</h2>
          <form id="basePlayerForm" class="base-form">
            <div class="base-form-row">
              <label class="base-field">
                <span class="base-field__label">Прізвище</span>
                <input id="basePlayerLastName" type="text" placeholder="Прізвище" required />
              </label>
              <label class="base-field">
                <span class="base-field__label">Ім'я</span>
                <input id="basePlayerFirstName" type="text" placeholder="Ім'я" required />
              </label>
              <label class="base-field">
                <span class="base-field__label">Рейтинг</span>
                <input id="basePlayerRating" type="number" min="0" max="4000" placeholder="Базовий рейтинг" required />
              </label>
              <label class="base-field">
                <span class="base-field__label">Спорт. звання</span>
                <select id="basePlayerRank">
                  <option value="б/р">б/р</option>
                  <option value="юнацький">юнацький</option>
                  <option value="3">3</option>
                  <option value="2">2</option>
                  <option value="1">1</option>
                  <option value="кмс">кмс</option>
                  <option value="мс">мс</option>
                  <option value="гр">гр</option>
                </select>
              </label>
              <label class="base-field">
                <span class="base-field__label">Дата народження</span>
                <input id="basePlayerBirthDate" type="date" />
              </label>
            </div>

            <div class="base-form-row base-form-row--actions">
              <label class="base-field">
                <span class="base-field__label">Фото гравця</span>
                <input id="basePlayerPhoto" type="file" accept="image/*" />
              </label>
              <label class="check-inline">
                <input id="basePlayerRemovePhoto" type="checkbox" />
                Видалити фото
              </label>
              <button id="basePlayerSubmitBtn" type="submit">Додати в базу</button>
              <button id="basePlayerCancelEditBtn" type="button" hidden>Скасувати редагування</button>
            </div>
          </form>
          <div id="baseEditHint" class="edit-hint" hidden></div>
          <div id="basePlayersList" class="scroll tall"></div>
        </section>
      </section>

      <section id="tab-archive" class="layout tab-panel">
        <section class="card full">
          <h2>Архів турнірів</h2>
          <div id="archiveList" class="stack"></div>
        </section>
      </section>
    </main>

    <footer class="footer">
      <p>Локально збережується у браузері (localStorage)</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
